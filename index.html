<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"> <!-- 페이지의 문자 인코딩을 UTF-8로 설정 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- 반응형 웹 디자인을 위해 뷰포트 설정 -->
    <title>광운대 백준 야매 랭킹</title> <!-- 페이지 제목 설정 -->
    <style>
        /* 전체 페이지 스타일 */
        body {
            font-family: Arial, sans-serif; /* 기본 글꼴 */
            background-color: #f9f9f9; /* 페이지 배경색 */
            padding: 20px; /* 페이지 안쪽 여백 */
            text-align: center; /* 텍스트 중앙 정렬 */
        }

        /* 상단 타이틀 컨테이너 */
        .title-container {
            display: flex; /* 플렉스 박스를 사용하여 정렬 */
            justify-content: center; /* 수평 중앙 정렬 */
            align-items: center; /* 수직 중앙 정렬 */
            margin-bottom: 40px; /* 아래쪽 여백 */
        }

        /* 타이틀 이미지 스타일 */
        .title-image {
            width: 50px; /* 이미지 너비 */
            margin: 0 10px; /* 좌우 여백 */
        }

        /* 타이틀 텍스트 스타일 */
        h1 {
            font-size: 24px; /* 글꼴 크기 */
            color: white; /* 글자 색상 */
            margin: 0; /* 마진 제거 */
            background-color: #6B2230; /* 배경색 */
            padding: 5px 15px; /* 텍스트 안쪽 여백 */
            border-radius: 5px; /* 둥근 모서리 */
            display: inline-block; /* 배경과 텍스트 크기 맞추기 */
        }

        /* 각 섹션 스타일 */
        .section {
            margin-bottom: 70px; /* 섹션 간 간격 */
        }

        /* 섹션 제목 스타일 */
        .section-title {
            margin-bottom: 10px; /* 제목과 단상 간 간격 */
            font-size: 18px; /* 글꼴 크기 */
            color: white; /* 글자 색상 */
            background-color: #6B2230; /* 제목 배경색 */
            text-align: center; /* 중앙 정렬 */
            border: 2px solid #6B2230; /* 제목 테두리 */
            padding: 5px; /* 제목 안쪽 여백 */
            border-radius: 5px; /* 둥근 모서리 */
        }

        /* 단상 컨테이너 스타일 */
        .podium {
            display: flex; /* 플렉스 박스를 사용하여 정렬 */
            justify-content: center; /* 수평 중앙 정렬 */
            align-items: flex-end; /* 하단 정렬 */
            gap: 20px; /* 단상 간 간격 */
            margin-top: 20px; /* 단상 위쪽 간격 */
        }

        /* 단상 공통 스타일 */
        .stage {
            display: flex; /* 플렉스 박스 사용 */
            flex-direction: column; /* 세로 정렬 */
            align-items: center; /* 수평 중앙 정렬 */
            justify-content: flex-end; /* 하단 정렬 */
            position: relative; /* 메달 위치 조정을 위해 상대 위치 */
            border-radius: 5px 5px 0 0; /* 위쪽 모서리 둥글게 */
            color: white; /* 글자 색상 */
            font-weight: bold; /* 글자 굵게 */
            padding-top: 10px; /* 내부 패딩 */
        }

        /* 1등 단상 스타일 */
        .stage-1 {
            height: 150px; /* 높이 */
            width: 100px; /* 너비 */
            background-color: #FFD700; /* 골드 색상 */
        }

        /* 2등 단상 스타일 */
        .stage-2 {
            height: 120px;
            width: 100px;
            background-color: #C0C0C0; /* 실버 색상 */
        }

        /* 3등 단상 스타일 */
        .stage-3 {
            height: 100px;
            width: 100px;
            background-color: #CD7F32; /* 브론즈 색상 */
        }

        /* 단상 나무 받침대 스타일 */
        .wood-base {
            background-color: #6B4230; /* 나무 색상 */
            width: 100px; /* 너비 */
            height: 20px; /* 높이 */
            border-radius: 0 0 5px 5px; /* 아래쪽 모서리 둥글게 */
            margin-top: 5px; /* 단상과의 간격 */
        }

        /* 메달 스타일 */
        .medal {
            position: absolute; /* 단상에 상대적으로 위치 설정 */
            bottom: -40px; /* 단상 아래로 위치 */
            font-size: 24px; /* 메달 크기 */
        }

        /* 사용자 이름 스타일 */
        .user {
           margin-top: auto; /* 자동 여백 */
           padding: 10px 5px; /* 텍스트 패딩 */
           text-align: center; /* 텍스트 중앙 정렬 */
       }
    </style>
</head>
<body>
    <!-- 타이틀 섹션 -->
    <div class="title-container">
        <img src="mascot_.png" alt="마스코트" class="title-image"> <!-- 왼쪽 마스코트 이미지 -->
        <h1>광운대 백준 야매 랭킹</h1> <!-- 메인 타이틀 -->

    <!-- 최근 제출 섹션 -->
    <div class="section">

        <div class="podium">
           <!-- 2등 단상 -->

                <div class="user">kwuser2</div> <!-- 사용자 이름 -->

           <!-- 1등 단상 -->
           <div class="stage stage-1">

           </div>
           <!-- 3등 단상 -->
           <div class="stage stage-3">
                <div class="user">kwuser3</div>
                <div class="wood-base"></div>
                <div class="medal">🥉</div> <!-- 3등 메달 -->
           </div>
       </div>
   </div>

   <!-- 잠수 순위 섹션 -->
   <div class="section">
       <h2 class="section-title">GHOST USER RANKING</h2> <!-- 섹션 제목 -->
       <div class="podium">
           <!-- 2등 단상 -->
           <div class="stage stage-2">
               <div class="user">kwuser5</div>

               <div class="medal">🥈</div>
           </div>
           <!-- 1등 단상 -->
           <div class="stage stage-1">
               <div class="user">kwuser6</div>
               <div class="wood-base"></div>
               <div class="medal">🥇</div>
           </div>
           <!-- 3등 단상 -->
           <div class="stage stage-3">
               <div class="user">kwuser4</div>
               <div class="wood-base"></div>
               <div class="medal">🥉</div>
           </div>
       </div>
   </div>

   <!-- 오늘의 탑 솔버 섹션 -->
   <div class="section">
       <h2 class="section-title">TODAY'S TOP SOLVER</h2> <!-- 섹션 제목 -->
       <div class="podium">
           <!-- 2등 단상 -->
           <div class="stage stage-2">
               <div class="user">kwuser8</div>
               <div class="wood-base"></div>
               <div class="medal">🥈</div>
           </div>
           <!-- 1등 단상 -->
           <div class="stage stage-1">
               <div class="user">kwuser7</div>
               <div class="wood-base"></div>
               <div class="medal">🥇</div>
           </div>
           <!-- 3등 단상 -->
           <div class="stage stage-3">
               <div class="user">kwuser9</div>
               <div class="wood-base"></div>
               <div class="medal">🥉</div>
           </div>
       </div>
   </div>

</body>
</html>
