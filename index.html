<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>광운대 백준 야매 랭킹</title>
    
    <style>
        /* 전체 페이지의 기본 스타일 */
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        /* 페이지 제목 스타일 */
        h1 {
            text-align: center;
        }

        /* 각 랭킹 섹션의 스타일 */
        .ranking-section {
            margin-bottom: 40px; /* 각 섹션 간격 */
            padding: 20px; /* 내부 여백 */
            border: 1px solid #ccc; /* 회색 테두리 */
            border-radius: 10px; /* 둥근 테두리 */
            background-color: #f9f9f9; /* 연한 배경색 */
        }

        /* 메달 아이콘 스타일 */
        .medal-icon {
            font-size: 24px; /* 아이콘 크기 */
            margin-right: 10px; /* 오른쪽 여백 */
        }

        /* 랭킹 항목 스타일 */
        .ranking-item {
            margin: 10px 0; /* 목록 항목 간격 */
        }
    </style>
</head>
<body>
    <h1>광운대 백준 야매 랭킹</h1>
    
    <!-- 최근 제출 랭킹 섹션 -->
    <div class="ranking-section">
        <h2>가장 최근 제출</h2>
        <div id="recentSubmissionChart"></div>
    </div>
    
    <!-- 잠수 순위 랭킹 섹션 -->
    <div class="ranking-section">
        <h2>잠수 순위 (가장 오래전에 제출한 사람)</h2>
        <div id="dormantUserChart"></div>
    </div>
    
    <!-- 오늘의 탑 솔버 랭킹 섹션 -->
    <div class="ranking-section">
        <h2>오늘 제일 많이 푼 사람</h2>
        <div id="topSolverToday"></div>
    </div>

    <!-- 랭킹 데이터를 처리하는 스크립트 -->
    <script src="ranking.js"></script>
</body>
</html>
