<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>광운대 백준 야매 랭킹</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            padding: 20px;
            text-align: center;
        }

        .title-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 40px;
        }

        .title-image {
            width: 50px;
            margin: 0 10px;
        }

        h1 {
            font-size: 24px;
            color: white;
            margin: 0;
            background-color: #6B2230;
            padding: 5px 15px;
            border-radius: 5px;
            display: inline-block;
        }

        .section {
            margin-bottom: 70px;
        }

        .section-title {
            margin-bottom: 10px;
            font-size: 18px;
            color: white; /* 텍스트 색상을 흰색으로 변경 */
            background-color: #6B2230; /* 배경색을 원래의 글자색으로 설정 */
            text-align: center;
            border: 2px solid #6B2230; /* 테두리 색상 유지 */
            padding: 5px;
            border-radius: 5px;
        }

        .podium {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            margin-top: 20px;
        }

        .stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            position: relative;
            border-radius: 5px 5px 0 0;
            color: white;
            font-weight: bold;
            padding-top: 10px;
        }

        .stage-1 {
            height: 150px;
            width: 100px;
            background-color: #FFD700; /* 골드 */
        }

        .stage-2 {
            height: 120px;
            width: 100px;
            background-color: #C0C0C0; /* 실버 */
        }

        .stage-3 {
            height: 100px;
            width: 100px;
            background-color: #CD7F32; /* 브론즈 */
        }

        .wood-base {
            background-color: #6B4230; 
            width: 100px; 
            height: 20px; 
            border-radius: 0 0 5px 5px; 
            margin-top: 5px; 
        }

        .medal {
            position: absolute; 
            bottom: -40px; 
            font-size: 24px; 
        }

        .user {
           margin-top:auto; 
           padding:10px 5px; 
           text-align:center; 
       }
    </style>
</head>
<body>
    <div class="title-container">
        <img src="mascot_.png" alt="마스코트" class="title-image">
        <h1>광운대 백준 야매 랭킹</h1>
        <img src="mascot2_.png" alt="마스코트2" class="title-image">
    </div>

    <!-- 최근 제출 섹션 -->
    <div class="section">
        <h2 class="section-title">THE MOST RECENT SUBMMITER</h2>
        <div class="podium">
           <div class="stage stage-2">
                <div class="user">kwuser2</div>
                <div class="wood-base"></div>
                <div class="medal">🥈</div>
           </div>
           <div class="stage stage-1">
                <div class="user">kwuser1</div>
                <div class="wood-base"></div>
                <div class="medal">🥇</div>
           </div>
           <div class="stage stage-3">
                <div class="user">kwuser3</div>
                <div class="wood-base"></div>
                <div class="medal">🥉</div>
           </div>
       </div>
   </div>

   <!-- 잠수 순위 섹션 -->
   <div class="section">
       <h2 class="section-title">GHOST USER RANKING</h2>
       <div class="podium">
           <div class="stage stage-2">
               <div class="user">kwuser5</div>
               <div class="wood-base"></div>
               <div class="medal">🥈</div>
           </div>
           <div class="stage stage-1">
               <div class="user">kwuser6</div>
               <div class="wood-base"></div>
               <div class="medal">🥇</div>
           </div>
           <div class="stage stage-3">
               <div class="user">kwuser4</div>
               <div class="wood-base"></div>
               <div class="medal">🥉</div>
           </div>
       </div>
   </div>

   <!-- 오늘의 탑 솔버 섹션 -->
   <div class="section">
       <h2 class="section-title">TODAY's MOST SOLVER</h2>
       <div class="podium">
           <div class="stage stage-2">
               <div class="user">kwuser8</div>
               <div class="wood-base"></div>
               <div class="medal">🥈</div>
           </div>
           <div class="stage stage-1">
               <div class="user">kwuser7</div>
               <div class="wood-base"></div>
               <div class="medal">🥇</div>
           </div>
           <div class="stage stage-3">
               <div class="user">kwuser9</div>
               <div class="wood-base"></div>
               <div class="medal">🥉</div>
           </div>
       </div>
   </div>

</body>
</html>
