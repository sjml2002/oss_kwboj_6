<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KWU student's BAEKJOON RANKING</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            padding: 20px;
            text-align: center;
        }
        .title-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 40px;
        }
        .title-image {
            width: 50px;
            margin: 0 10px;
        }
        h1 {
            font-size: 24px;
            color: white;
            margin: 0;
            background-color: #6B2230;
            padding: 5px 15px;
            border-radius: 5px;
            display: inline-block;
        }
        .section {
            margin-bottom: 70px;
            padding: 10px 0px 60px 0px;
            border: 4px solid #6B2230;
            border-radius: 10px;
            background-color: #f9f9f9;
        }
        .section-title {
            margin-top: -10px;
            margin-bottom: 10px;
            font-size: 18px;
            color: white;
            background-color: #6B2230;
            text-align: center;
            border: 2px solid #6B2230;
            padding: 5px;
            border-radius: 2px;
            text-shadow: -1px -1px 0 #000000, 1px -1px 0 #000000, -1px 1px 0 #000000, 1px 1px 0 #000000;
        }
        .podium {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            margin-top: 20px;
        }
        .stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            position: relative;
            border-radius: 5px 5px 0 0;
            color: white;
            font-weight: bold;
            padding-top: 10px;
        }
        .stage-1 {
            height: 150px;
            width: 100px;
            background-color: #FFD700;
        }
        .stage-2 {
            height: 120px;
            width: 100px;
            background-color: #C0C0C0;
        }
        .stage-3 {
            height: 100px;
            width: 100px;
            background-color: #CD7F32;
        }
        .wood-base {
            background-color: #6B4230;
            width: 100px;
            height: 20px;
            border-radius: 0 0 5px 5px;
            margin-top: 5px;
        }
        .medal {
            position: absolute;
            bottom: -40px;
            font-size: 24px;
        }
        .user {
            margin-top: auto;
            padding: 10px 5px;
            text-align: center;
            color: #6B2230;
            text-shadow: -1px -1px 0 #FFFFFF, 1px -1px 0 #FFFFFF, -1px 1px 0 #FFFFFF, 1px 1px 0 #FFFFFF;
        }
    </style>
</head>
<body>
    <div class="title-container">
        <img src="/rankingImage/mascot_.png" alt="마스코트" class="title-image">
        <h1>KWU student's BAEKJOON RANKING</h1>
        <img src="/rankingImage/mascot2_.png" alt="마스코트2" class="title-image">
    </div>

    <div class="section" id="recent-submitters">
        <h2 class="section-title">THE MOST RECENT SUBMITTER</h2>
        <div class="podium" id="recent-podium"></div>
    </div>

    <div class="section" id="ghost-users">
        <h2 class="section-title">GHOST USER RANKING</h2>
        <div class="podium" id="ghost-podium"></div>
    </div>

    <div class="section" id="top-solvers">
        <h2 class="section-title">TODAY'S TOP SOLVER</h2>
        <div class="podium" id="solver-podium"></div>
    </div>

    <script src="./ranking.js"></script>
</body>
</html>
